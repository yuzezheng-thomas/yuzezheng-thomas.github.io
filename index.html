<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Photography and personal website for Yuze Zheng.">
    <title>Yuze Zheng Photography</title>
    <link rel="stylesheet" href="style.css?v=20260527-featured">
  </head>
  <body>
    <!-- After setup, index.html should rarely need to be edited.
      Personal text lives in data/profile.json.
      Photography entries live in data/photos.json.
      Photo files go in assets/photos/.
      CV files can still go in assets/cv/ if needed later.
    -->
    <header class="site-header">
      <nav class="nav" aria-label="Primary navigation">
        <a class="brand" href="#home" data-profile="name">Yuze Zheng</a>
        <button class="nav-toggle" type="button" aria-label="Toggle navigation" aria-expanded="false">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <div class="nav-links">
          <a href="#home">Home</a>
          <a href="#about">About</a>
          <a href="#photography">Photography</a>
          <a href="#contact">Contact</a>
        </div>
      </nav>
    </header>

    <main>
      <section id="home" class="hero section">
        <div class="hero-copy">
          <p class="eyebrow">Photography</p>
          <h1 data-profile="displayName">Yuze Zheng</h1>
          <p class="hero-intro" data-profile="shortIntro"></p>
          <div class="button-row">
            <a class="button primary" href="#photography">View Gallery</a>
            <a class="button" href="#about">About</a>
            <a class="button ghost" href="#contact">Contact</a>
          </div>
        </div>
        <div class="featured-panel" aria-label="Featured photography">
          <div class="featured-heading">
            <p class="eyebrow">Featured Story</p>
            <a href="#photography">Open Gallery</a>
          </div>
          <div class="featured-photos" id="featured-photos"></div>
        </div>
      </section>

      <section id="about" class="section about-section">
        <div class="section-heading">
          <p class="eyebrow">About</p>
          <h2>A Short Introduction</h2>
        </div>
        <div class="prose intro-card" id="biography"></div>
      </section>

      <section id="photography" class="section gallery-section">
        <div class="section-heading split">
          <div>
            <p class="eyebrow">Photography</p>
            <h2>Gallery</h2>
          </div>
          <div class="filter-bar" id="photo-filters" aria-label="Photography category filters"></div>
        </div>
        <div class="gallery" id="gallery" aria-live="polite"></div>
      </section>

      <section id="contact" class="section contact-section">
        <div class="section-heading">
          <p class="eyebrow">Contact</p>
          <h2>Say Hello</h2>
        </div>
        <p class="contact-copy">
          For photography, collaboration, or personal notes, please use one of the links below.
        </p>
        <div class="contact-links" id="contact-links"></div>
      </section>
    </main>

    <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Photo preview" hidden>
      <button class="lightbox-close" type="button" aria-label="Close photo preview">&times;</button>
      <div class="lightbox-content">
        <img id="lightbox-image" alt="">
        <div class="lightbox-caption">
          <h3 id="lightbox-title"></h3>
          <p id="lightbox-meta"></p>
          <p id="lightbox-text"></p>
        </div>
      </div>
    </div>

    <script src="script.js?v=20260527-featured"></script>
  </body>
</html>

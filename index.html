<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Photography and personal website for Yuze Zheng.">
    <title>Yuze Zheng Photography</title>
    <link rel="stylesheet" href="style.css?v=20260528-layout-refine">
  </head>
  <body>
    <!-- After setup, index.html should rarely need to be edited.
      Personal text lives in data/profile.json.
      Photography entries live in data/photos.json.
      Photo files go in assets/photos/.
      CV files can still go in assets/cv/ if needed later.
    -->
    <header class="site-header">
      <nav class="nav" aria-label="Primary navigation">
        <a class="brand" href="#home" data-profile="name">Yuze Zheng</a>
        <button class="nav-toggle" type="button" aria-label="Toggle navigation" aria-expanded="false">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <div class="nav-links">
          <a href="#home">Home</a>
          <a href="#about">Behind the Camera</a>
          <a href="#photography">Photography</a>
          <a href="#contact">Contact</a>
        </div>
      </nav>
    </header>

    <main>
      <section id="home" class="hero collage-hero">
        <div class="collage-label">
          <p class="eyebrow">Photography by Yuze Zheng</p>
          <p>Chicago · Wildlife · Light · Everyday Moments</p>
        </div>
        <div class="photo-collage" id="photo-collage" aria-label="Featured photography collage"></div>
      </section>

      <section id="about" class="section about-section">
        <div class="section-heading">
          <p class="eyebrow">Behind the Camera</p>
        </div>
        <div class="about-layout" id="about-profile"></div>
      </section>

      <section id="photography" class="section gallery-section">
        <div class="section-heading split">
          <div>
            <p class="eyebrow">Photography</p>
            <h2>Photography Collections</h2>
          </div>
        </div>
        <div class="collection-card-grid" id="gallery" aria-live="polite"></div>
      </section>

      <section id="contact" class="section contact-section">
        <div class="section-heading">
          <p class="eyebrow">Contact</p>
          <h2>Say Hello</h2>
        </div>
        <p class="contact-copy">
          For photography, collaboration, or personal notes, please use one of the links below.
        </p>
        <div class="contact-links" id="contact-links"></div>
      </section>
    </main>

    <script src="script.js?v=20260528-layout-refine"></script>
  </body>
</html>
